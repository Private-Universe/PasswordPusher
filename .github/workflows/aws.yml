# This workflow will build and push a new container image to Amazon ECR,
# and then will deploy a new task definition to Amazon ECS, when a release is created
#
# To use this workflow, you will need to complete the following set-up steps:
#
# 1. Create an ECR repository to store your images.
#    For example: `aws ecr create-repository --repository-name my-ecr-repo --region us-east-2`.
#    Replace the value of `ECR_REPOSITORY` in the workflow below with your repository's name.
#    Replace the value of `aws-region` in the workflow below with your repository's region.
#
# 2. Create an ECS task definition, an ECS cluster, and an ECS service.
#    For example, follow the Getting Started guide on the ECS console:
#      https://us-east-2.console.aws.amazon.com/ecs/home?region=us-east-2#/firstRun
#    Replace the values for `service` and `cluster` in the workflow below with your service and cluster names.
#
# 3. Store your ECS task definition as a JSON file in your repository.
#    The format should follow the output of `aws ecs register-task-definition --generate-cli-skeleton`.
#    Replace the value of `task-definition` in the workflow below with your JSON file's name.
#    Replace the value of `container-name` in the workflow below with the name of the container
#    in the `containerDefinitions` section of the task definition.
#
# 4. Store an IAM user access key in GitHub Actions secrets named `AWS_ACCESS_KEY_ID` and `AWS_SECRET_ACCESS_KEY`.
#    See the documentation for each action used below for the recommended IAM policies for this IAM user,
#    and best practices on handling the access key credentials.

on:
  release:
    types: [created]

name: Deploy to Amazon ECS

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-2

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: passwordpusherv2
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Build a docker container and
        # push it to ECR so that it can
        # be deployed to ECS.
        echo "${{ secrets.ID_RSA }}" > github_key
        chmod 600 ./github_key
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "::set-output name=image::$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

    - name: Create task definition from current revision and register new one
      id: task-def
      env:
        AWS_REGION: ap-southeast-2
        CLUSTER: PasswordPusherV3
        SERVICE: passwordpusher
        IMAGE: ${{ steps.build-image.outputs.image }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        set -e
        echo "Describing current service..."
        aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --region "$AWS_REGION" > svc.json
        TASK_DEF_ARN=$(jq -r '.services[0].taskDefinition' svc.json)
        echo "Current task definition: $TASK_DEF_ARN"
        aws ecs describe-task-definition --task-definition "$TASK_DEF_ARN" --region "$AWS_REGION" > td.json
        # Remove fields not allowed when registering a new task definition
        jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' td.json > td-register.json
        # Update image and append RELEASE_ID env var (preserves existing env vars)
        jq --arg IMAGE "$IMAGE" --arg TAG "$IMAGE_TAG" '
          .containerDefinitions |= map(
            .image = $IMAGE
            | .environment |= (if . == null then [{"name":"RELEASE_ID","value":$TAG}] else (. + [{"name":"RELEASE_ID","value":$TAG}]) end)
          )
        ' td-register.json > td-register-2.json
        aws ecs register-task-definition --cli-input-json file://td-register-2.json --region "$AWS_REGION" > register_out.json
        NEW_TASK_DEF_ARN=$(jq -r '.taskDefinition.taskDefinitionArn' register_out.json)
        echo "Registered new task definition: $NEW_TASK_DEF_ARN"
        echo "::set-output name=task-definition::$NEW_TASK_DEF_ARN"

    - name: Update ECS service to use new task definition and wait for stability
      run: |
        set -e
        aws ecs update-service --cluster PasswordPusherV3 --service passwordpusher --task-definition ${{ steps.task-def.outputs.task-definition }} --region ap-southeast-2
        aws ecs wait services-stable --cluster PasswordPusherV3 --services passwordpusher --region ap-southeast-2